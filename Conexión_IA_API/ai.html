<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chatbot degetIA</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    background: linear-gradient(135deg, #ddc9a3, #f7edc4);
    height: 100vh;
    display: flex;
    align-items: center; /* Centra el chat verticalmente */
  }

  .chat-container {
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }

  .header {
    background: #a7201f;
    color: white;
    padding: 15px;
    text-align: center;
    font-weight: bold;
    font-size: 1.2rem;
  }

  .chat-box {
    height: 450px;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column; /* Vital para que las burbujas se apilen bien */
  }

  .message {
    margin: 8px 0;
    padding: 12px 16px;
    border-radius: 15px;
    max-width: 85%;
    line-height: 1.4;
    word-wrap: break-word; /* Evita que fórmulas largas rompan el diseño */
  }

  .user {
    background: #ddc9a3;
    color: #333;
    align-self: flex-end; /* Alinea a la derecha */
    border-bottom-right-radius: 2px; /* Efecto de "colita" de mensaje */
  }

  .bot {
    background: #f1f1f1;
    color: #333;
    align-self: flex-start; /* Alinea a la izquierda */
    border-bottom-left-radius: 2px;
  }

  .input-area {
    display: flex;
    border-top: 1px solid #eee;
    background: #fff;
  }

  input {
    flex: 1;
    padding: 15px;
    border: none;
    outline: none;
    font-size: 1rem;
  }

  button {
    background: #a7201f;
    color: white;
    border: none;
    padding: 15px 25px;
    cursor: pointer;
    font-weight: bold;
    font-size: 1rem;
    transition: background 0.3s ease;
  }

  button:hover {
    background: #8a1918;
  }
</style>
</head>
<body>

<div class="chat-container">
  <div class="header">Asistente degetIA</div>
  
  <div id="chat" class="chat-box">
    <div class="message bot">¡Hola! Soy degetIA. ¿En qué te puedo ayudar?</div>
  </div>

  <div class="input-area">
    <input type="text" id="input_ia" placeholder="Escribe tu pregunta aquí..." onkeypress="manejarEnter(event)">
    <button onclick="llamarIA()">Enviar</button>
  </div>
</div>

<script src="Logica.js"></script>
</body>
</html>
